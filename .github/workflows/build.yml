name: Build Maine Government Feeds

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 */6 * * *"
  # NOTE: update this branch name if you rename/replace the repository's default branch.
  push:
    branches: [main]
    paths:
      - "sources.yml"
      - "roles.yml"
      - "scripts/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: build-feeds
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Role classification is optional and fail-soft: if this secret is unset,
      # the classify/role-feed step is skipped entirely and no role feeds are
      # published (rather than publishing lower-quality heuristic feeds).
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build feeds
        run: python scripts/build_feeds.py

      - name: Validate feeds
        run: python scripts/validate_feeds.py

      # Optional, fail-soft role classification: tag new items into practitioner
      # roles (incremental + cached in state) and build the per-role curated
      # feeds. Runs only when OPENAI_API_KEY is configured; the classifier itself
      # exits 0 on any API error, so this never breaks the core build.
      - name: Classify items and build curated role feeds
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python scripts/classify_items.py --backend openai
          python scripts/build_role_feeds.py

      - name: Commit and push generated files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/state/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update feeds [automated]"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Source-health watcher: open/update/close a single tracking issue for
      # sources that have failed for several consecutive builds. Fail-soft and
      # uses only the built-in GITHUB_TOKEN.
      - name: Reconcile source-health issue
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEALTH_FAIL_THRESHOLD: "3"
        run: python scripts/health_watch.py

      # Best-effort third-party timestamping: ask the Internet Archive's
      # Save Page Now to snapshot the key published artifacts whenever they
      # changed. This gives a neutral, externally-verifiable record of when
      # each build's content was live, complementing the git history.
      # Never fails the build (SPN is rate-limited and occasionally down).
      - name: Archive published site to the Wayback Machine
        if: steps.commit.outputs.pushed == 'true'
        continue-on-error: true
        run: |
          for url in \
            "https://bedardandy.github.io/maine-government-feeds/" \
            "https://bedardandy.github.io/maine-government-feeds/feeds/json/catalog.json" \
            "https://bedardandy.github.io/maine-government-feeds/calendar/all-feeds.ics"; do
            curl -sS -m 60 -o /dev/null -w "SPN %{http_code} $url\n" \
              "https://web.archive.org/save/$url" || true
            sleep 5
          done
