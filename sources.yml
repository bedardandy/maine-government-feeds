# Maine Government Feeds — source catalog
#
# Every URL here was verified to be real and publicly accessible at the time
# it was added. Where a native RSS/Atom feed exists, it's used directly
# (type: native_rss). Otherwise the page is parsed with CSS selectors
# (type: html), or monitored as a whole for content changes when no
# reliable per-item structure exists (type: page_monitor).
#
# See README.md ('Adding or editing a source') for the field reference.

sources:
- id: jb-sjc-opinions
